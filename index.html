<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f0f1e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Currency Converter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            color: #9ca3af;
        }

        .card {
            background: rgba(30, 30, 50, 0.9);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b5cf6;
            margin-bottom: 8px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input, select {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            font-size: 16px;
            color: #fff;
            background-color: #1a1a2e;
            font-family: inherit;
        }

        select {
            cursor: pointer;
            font-weight: 600;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        select option {
            background-color: #1a1a2e;
            color: #fff;
        }

        .result-box {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }

        .result-label {
            font-size: 12px;
            color: #9ca3af;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .result-amount {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .result-rate {
            font-size: 14px;
            color: #9ca3af;
        }

        .swap-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
            display: block;
            margin: 20px auto;
            transition: transform 0.2s;
        }

        .swap-btn:active {
            transform: scale(0.9);
        }

        .error {
            color: #fca5a5;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        @media (max-width: 375px) {
            .header h1 {
                font-size: 40px;
            }
            .card {
                padding: 20px;
            }
            .result-amount {
                font-size: 28px;
            }
            input, select {
                font-size: 16px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Currency</h1>
            <p>Real-time conversion</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label>Amount</label>
                <div class="input-row">
                    <input type="number" id="amount" value="1" min="0" step="0.01">
                    <select id="from">
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                        <option value="JPY">JPY</option>
                        <option value="CHF">CHF</option>
                        <option value="CAD">CAD</option>
                        <option value="AUD">AUD</option>
                        <option value="NZD">NZD</option>
                        <option value="CNY">CNY</option>
                        <option value="INR">INR</option>
                        <option value="MXN">MXN</option>
                        <option value="SGD">SGD</option>
                        <option value="HKD">HKD</option>
                        <option value="SEK">SEK</option>
                        <option value="NOK">NOK</option>
                        <option value="ZAR">ZAR</option>
                        <option value="RUB">RUB</option>
                        <option value="BRL">BRL</option>
                        <option value="UAH">UAH</option>
                        <option value="AED">AED</option>
                        <option value="ARS">ARS</option>
                        <option value="CZK">CZK</option>
                        <option value="DKK">DKK</option>
                        <option value="HUF">HUF</option>
                        <option value="IDR">IDR</option>
                        <option value="ILS">ILS</option>
                        <option value="KRW">KRW</option>
                        <option value="MYR">MYR</option>
                        <option value="PHP">PHP</option>
                        <option value="PLN">PLN</option>
                        <option value="THB">THB</option>
                        <option value="TRY">TRY</option>
                        <option value="VND">VND</option>
                    </select>
                </div>
            </div>

            <div class="result-box">
                <div class="result-label">Converted Amount</div>
                <div class="result-amount" id="result">0.00</div>
                <div class="result-rate" id="rate">Loading...</div>
                <div class="error" id="error"></div>
            </div>

            <button class="swap-btn" id="swap">⇅</button>

            <div class="input-group">
                <label>Convert To</label>
                <div class="input-row">
                    <select id="to">
                        <option value="EUR">EUR</option>
                        <option value="USD">USD</option>
                        <option value="GBP">GBP</option>
                        <option value="JPY">JPY</option>
                        <option value="CHF">CHF</option>
                        <option value="CAD">CAD</option>
                        <option value="AUD">AUD</option>
                        <option value="NZD">NZD</option>
                        <option value="CNY">CNY</option>
                        <option value="INR">INR</option>
                        <option value="MXN">MXN</option>
                        <option value="SGD">SGD</option>
                        <option value="HKD">HKD</option>
                        <option value="SEK">SEK</option>
                        <option value="NOK">NOK</option>
                        <option value="ZAR">ZAR</option>
                        <option value="RUB">RUB</option>
                        <option value="BRL">BRL</option>
                        <option value="UAH">UAH</option>
                        <option value="AED">AED</option>
                        <option value="ARS">ARS</option>
                        <option value="CZK">CZK</option>
                        <option value="DKK">DKK</option>
                        <option value="HUF">HUF</option>
                        <option value="IDR">IDR</option>
                        <option value="ILS">ILS</option>
                        <option value="KRW">KRW</option>
                        <option value="MYR">MYR</option>
                        <option value="PHP">PHP</option>
                        <option value="PLN">PLN</option>
                        <option value="THB">THB</option>
                        <option value="TRY">TRY</option>
                        <option value="VND">VND</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/';
        const amountEl = document.getElementById('amount');
        const fromEl = document.getElementById('from');
        const toEl = document.getElementById('to');
        const resultEl = document.getElementById('result');
        const rateEl = document.getElementById('rate');
        const errorEl = document.getElementById('error');
        const swapBtn = document.getElementById('swap');

        let cache = {};

        async function getRate(base) {
            if (cache[base]) return cache[base];
            try {
                const res = await fetch(`${API_URL}${base.toLowerCase()}.json`);
                const data = await res.json();
                cache[base] = data[base.toLowerCase()];
                return cache[base];
            } catch (e) {
                errorEl.textContent = 'Failed to load rates';
                errorEl.style.display = 'block';
                return null;
            }
        }

        async function convert() {
            const val = parseFloat(amountEl.value) || 0;
            const from = fromEl.value;
            const to = toEl.value;

            if (val === 0) {
                resultEl.textContent = '0.00';
                rateEl.textContent = 'Enter amount';
                return;
            }

            const rates = await getRate(from);
            if (!rates) return;

            const rate = rates[to.toLowerCase()];
            if (!rate) {
                errorEl.textContent = 'Rate not found';
                errorEl.style.display = 'block';
                return;
            }

            errorEl.style.display = 'none';
            resultEl.textContent = (val * rate).toFixed(2) + ' ' + to;
            rateEl.textContent = '1 ' + from + ' = ' + rate.toFixed(4) + ' ' + to;
        }

        amountEl.addEventListener('input', convert);
        fromEl.addEventListener('change', convert);
        toEl.addEventListener('change', convert);

        swapBtn.addEventListener('click', () => {
            const temp = fromEl.value;
            fromEl.value = toEl.value;
            toEl.value = temp;
            convert();
        });

        convert();
    </script>
</body>
</html>
